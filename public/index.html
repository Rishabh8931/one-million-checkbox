<!DOCTYPE html>
<html lang="en">

<head>
          <meta charset="UTF-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>One Million Checkboxes</title>


          <style>
                    * {
                              margin: 0;
                              padding: 0;
                              box-sizing: border-box;
                              font-family: Inter, Segoe UI, sans-serif;
                    }

                    body {
                              min-height: 100vh;
                              background:
                                        radial-gradient(circle at top left, #6d28d9 0%, transparent 40%),
                                        radial-gradient(circle at bottom right, #0ea5e9 0%, transparent 40%),
                                        linear-gradient(135deg, #0f172a, #020617);
                              color: white;
                              display: flex;
                              justify-content: center;
                              padding: 50px 20px;
                    }

                    .wrapper {
                              width: min(1200px, 100%);
                    }

                    h1 {
                              text-align: center;
                              font-size: 3rem;
                              margin-bottom: 30px;
                              letter-spacing: 2px;
                              font-weight: 800;
                              background: linear-gradient(90deg, #38bdf8, #818cf8, #c084fc);
                              -webkit-background-clip: text;
                              color: transparent;
                    }

                    .subtitle {
                              text-align: center;
                              color: #94a3b8;
                              margin-bottom: 30px;
                    }

                    #container {
                              background: rgba(255, 255, 255, .08);
                              backdrop-filter: blur(20px);
                              border: 1px solid rgba(255, 255, 255, .15);
                              border-radius: 24px;
                              padding: 25px;
                              display: grid;
                              grid-template-columns: repeat(auto-fill, minmax(35px, 1fr));
                              gap: 12px;
                              box-shadow:
                                        0 10px 40px rgba(0, 0, 0, .45),
                                        inset 0 1px rgba(255, 255, 255, .1);
                    }

                    #container input {
                              appearance: none;
                              width: 28px;
                              height: 28px;
                              border-radius: 8px;
                              border: 2px solid rgba(255, 255, 255, .25);
                              background: rgba(255, 255, 255, .05);
                              cursor: pointer;
                              transition: .25s;
                              position: relative;
                    }

                    #container input:hover {
                              transform: scale(1.15);
                              border-color: #60a5fa;
                              box-shadow: 0 0 10px #3b82f6;
                    }

                    #container input:checked {
                              background: linear-gradient(135deg, #06b6d4, #6366f1);
                              border: none;
                              box-shadow:
                                        0 0 8px #38bdf8,
                                        0 0 18px #6366f1;
                    }

                    #container input:checked::after {
                              content: "✓";
                              position: absolute;
                              color: white;
                              font-size: 16px;
                              font-weight: bold;
                              left: 50%;
                              top: 50%;
                              transform: translate(-50%, -52%);
                    }

                    ::-webkit-scrollbar {
                              width: 10px;
                    }

                    ::-webkit-scrollbar-thumb {
                              background: #475569;
                              border-radius: 20px;
                    }

                    ::-webkit-scrollbar-track {
                              background: #111827;
                    }
          </style>

</head>

<body>

          <div class="wrapper">

                    <h1>☑ One Million Checkboxes</h1>
                    <p class="subtitle">
                              Select as many as you want ✨
                    </p>

                    <div id="container"></div>

          </div>

         <script src="/socket.io/socket.io.js"></script>

          <script>
                  const container = document.getElementById("container")
                  const socket = io()
                    
                  // fetching checkboxes from server
                  window.addEventListener("load", async () => {
                           const response = await fetch("/checkboxes", {method : 'GET'})
                           const data = await response.json()

                           const checkboxes = data.checkboxes

                           checkboxes.forEach((serverValue, index) => {
                              const input = document.createElement('input')
                              input.type = 'checkbox'
                              input.id = `checkbox-${index}`
                              input.checked = serverValue

                              container.appendChild(input)
                           })
                  })
                 
                  

          
          </script>

</body>

</html>
